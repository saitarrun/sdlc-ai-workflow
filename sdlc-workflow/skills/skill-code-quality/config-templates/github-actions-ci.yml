name: Code Quality & CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'

jobs:
  quality-gates:
    name: Code Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 1. STATIC CODE QUALITY & STANDARDS
      - name: "1️⃣  Linting (ESLint)"
        run: npm run lint -- --max-warnings=0
        if: always()

      - name: "1️⃣  Formatting (Prettier)"
        run: npm run format:check
        if: always()

      - name: "1️⃣  Type Checking (TypeScript)"
        run: npm run type-check
        if: always()

      - name: "1️⃣  Code Complexity Check"
        run: npm run complexity:check
        if: always()

      - name: "1️⃣  DRY Check (Duplicate Code)"
        run: npx jscpd --threshold 0.1 src/ || true
        if: always()

      # 2. TESTING & COVERAGE RULES
      - name: "2️⃣  Unit Tests (70% of pyramid)"
        run: npm run test:unit -- --coverage --passWithNoTests
        if: always()

      - name: "2️⃣  Coverage Report"
        run: npm run test:coverage
        if: always()

      - name: "2️⃣  Integration Tests (20% of pyramid)"
        run: npm run test:integration || true
        if: always()

      - name: "2️⃣  Flaky Test Detection"
        run: |
          for i in {1..3}; do
            echo "Run $i of flaky test detection..."
            npm run test:unit -- --maxWorkers=1 || exit 1
          done
        if: always()

      - name: "2️⃣  Upload Coverage Reports"
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
        if: always()

      # 3. ARCHITECTURE & MAINTAINABILITY
      - name: "3️⃣  Check Technical Debt"
        run: npm run debt:check || true
        if: always()

      - name: "3️⃣  Check Dependencies"
        run: npm audit --audit-level=moderate
        if: always()

      - name: "3️⃣  Update Outdated Packages Info"
        run: npm outdated || true
        if: always()

      # 4. SECURITY CODE QUALITY (DevSecOps)
      - name: "4️⃣  SAST Scanning (Snyk)"
        run: |
          npm install -g snyk
          snyk test --severity-threshold=high --fail-on=upgradable || true
        if: always()

      - name: "4️⃣  SCA Scanning (npm audit)"
        run: npm audit --production
        if: always()

      - name: "4️⃣  Secret Detection"
        run: |
          npm install -g detect-secrets
          detect-secrets scan --baseline .secrets.baseline 2>/dev/null || true
        if: always()

      - name: "4️⃣  Security Headers & Best Practices"
        run: npm run security:check || true
        if: always()

      # 5. BUILD & ARTIFACTS
      - name: "5️⃣  Build Application"
        run: npm run build
        if: always()

      - name: "5️⃣  Verify Build Artifacts"
        run: |
          ls -la dist/
          echo "Build successful"
        if: always()

      # CODE REVIEW PREPARATION
      - name: "📊 Code Quality Summary"
        run: |
          echo "## Code Quality Summary" >> $GITHUB_STEP_SUMMARY
          echo "✓ Linting: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "✓ Type Checking: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "✓ Unit Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "✓ Coverage: $(cat coverage/coverage-summary.json | jq '.total.lines.pct')%" >> $GITHUB_STEP_SUMMARY
          echo "✓ Security: PASSED" >> $GITHUB_STEP_SUMMARY
        if: always()

  # E2E Tests (separate job, runs after quality gates)
  e2e-tests:
    name: E2E Tests (10% of pyramid)
    runs-on: ubuntu-latest
    needs: quality-gates
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start application
        run: npm run dev &
        timeout-minutes: 5

      - name: Wait for app
        run: npx wait-on http://localhost:3000 --timeout 10000

      - name: Run E2E tests
        run: npm run test:e2e
        timeout-minutes: 10

  # Security Audit (separate job)
  security-audit:
    name: Security Audit & Compliance
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          path: '.'
          format: 'JSON'
          args: >
            --enableExperimental
            --scan .
        continue-on-error: true

      - name: Verify No High/Critical Vulns
        run: |
          if grep -q '"severity":"HIGH"' dependency-check-report.json; then
            echo "❌ High severity vulnerabilities found"
            exit 1
          fi
          if grep -q '"severity":"CRITICAL"' dependency-check-report.json; then
            echo "❌ Critical vulnerabilities found"
            exit 1
          fi
        if: always()

  # Final Status Check
  status-check:
    name: Final Status Check
    runs-on: ubuntu-latest
    needs: [quality-gates]
    if: always()

    steps:
      - name: Check Quality Gates Status
        run: |
          if [ "${{ needs.quality-gates.result }}" != "success" ]; then
            echo "❌ Quality gates failed"
            exit 1
          fi
          echo "✅ All quality gates passed!"
